<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 130" width="100%" height="100%">
  <defs>
    <linearGradient id="coreBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2575FC" />
      <stop offset="100%" stop-color="#1A4BCC" />
    </linearGradient>
    
    <linearGradient id="vaultBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>

    <linearGradient id="iconGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(15, 10)">
    <path d="M 50 15 L 90 38 L 90 85 L 50 108 L 10 85 L 10 38 Z" fill="none" stroke="#E2E8F0" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M 50 15 L 50 50 M 50 108 L 50 78" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
    <path d="M 10 38 L 40 55" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
    <path d="M 90 38 L 60 55" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
    <path d="M 10 85 L 50 61 L 90 85" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linejoin="round" opacity="0.4" />

    <circle cx="50" cy="62" r="11" fill="none" stroke="url(#iconGlow)" stroke-width="5" filter="url(#neonGlow)" />
    
    <path d="M 32 46 A 24 24 0 0 1 68 46" fill="none" stroke="url(#iconGlow)" stroke-width="4" stroke-linecap="round" filter="url(#neonGlow)" />
  </g>

  <g transform="translate(130, 68)">
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="44" letter-spacing="0.5">
      <tspan fill="url(#coreBlue)">CORE</tspan><tspan fill="url(#vaultBlue)">VAULT</tspan>
    </text>
    
    <text y="32" x="2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="13" fill="#94A3B8" letter-spacing="5.5">
      core tech <tspan fill="url(#vaultBlue)">•</tspan> secured deals
    </text>
  </g>
</svg>
